version: '3.8'

services:
  # Aplicação Flask com Gunicorn
  app:
    build: .
    container_name: kairos-rastreio-app
    ports:
      - "8000:8000"
    environment:
      - FLASK_ENV=production
      - SITERASTREIO_TOKEN=${SITERASTREIO_TOKEN}
    volumes:
      # Persistir banco de dados
      - ./instance:/app/instance
      # Logs
      - ./logs:/app/logs
    restart: unless-stopped
    networks:
      - kairos-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  kairos-network:
    driver: bridge

volumes:
  instance:
    driver: local
