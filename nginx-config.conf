# Configuração do Nginx para Kairos Rastreio
# Copiar para: /etc/nginx/sites-available/kairos-rastreio

# Redirecionar HTTP para HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name seu_dominio.com www.seu_dominio.com;

    # Redirecionar para HTTPS
    return 301 https://$server_name$request_uri;
}

# Bloco HTTPS (depois de configurar SSL com certbot)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name seu_dominio.com www.seu_dominio.com;

    # Certificados SSL (certbot vai preencher isso)
    # ssl_certificate /etc/letsencrypt/live/seu_dominio.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/seu_dominio.com/privkey.pem;

    # Melhor prática de segurança SSL
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Segurança adicional
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Logs
    access_log /var/log/nginx/kairos-rastreio-access.log;
    error_log /var/log/nginx/kairos-rastreio-error.log;

    # Tamanho máximo de upload
    client_max_body_size 20M;

    # Localização raiz
    location / {
        # Passar requisição para Gunicorn
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        
        # Headers necessários para proxy
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Websockets (se usado)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Servir arquivos estáticos
    location /static/ {
        alias /var/www/kairos-rastreio/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml application/atom+xml image/svg+xml 
               text/x-js text/x-component text/x-cross-domain-policy;
}

